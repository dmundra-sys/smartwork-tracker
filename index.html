<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartWork - Work Allocation & Performance Tracking</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e29;--bg4:#222736;
--border:#2a2f3d;--border2:#363c4f;
--text:#e8eaf0;--text2:#9ca3b0;--text3:#5c6272;
--blue:#4f8ef7;--blue2:#3a6fd4;--blue3:#1a3a7a;
--green:#3ecf6a;--green2:#2aaa52;--green3:#1a4a28;
--amber:#f59e1a;--amber2:#d4830e;--amber3:#5a3500;
--red:#f05050;--red2:#c73535;--red3:#4a1515;
--purple:#a78bfa;--purple2:#7c5cd4;--purple3:#2d1f5a;
--teal:#2dd4bf;--teal2:#14a898;--teal3:#0a3a35;
--radius:8px;--radius2:12px;--radius3:16px;
--shadow:0 4px 24px rgba(0,0,0,0.4);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width 0.3s}
.sidebar.collapsed{width:64px;min-width:64px}
.sidebar-brand{padding:20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.brand-text{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden}
.brand-sub{font-size:10px;color:var(--text3);font-weight:400}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all 0.15s;white-space:nowrap;overflow:hidden;margin-bottom:2px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--blue3);color:var(--blue);border:1px solid rgba(79,142,247,0.2)}
.nav-icon{width:20px;height:20px;flex-shrink:0;font-size:16px}
.nav-badge{margin-left:auto;background:var(--red);color:white;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;flex-shrink:0}
.sidebar-user{padding:12px 8px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:var(--radius2);cursor:pointer}
.user-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--text3)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:16px 24px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px}
.page-title{font-size:18px;font-weight:700;flex:1}
.topbar-actions{display:flex;align-items:center;gap:10px}
.btn{padding:8px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.15s;font-family:inherit}
.btn-primary{background:var(--blue);color:white}.btn-primary:hover{background:var(--blue2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-secondary:hover{background:var(--bg4)}
.btn-danger{background:var(--red);color:white}.btn-danger:hover{background:var(--red2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border);cursor:pointer;color:var(--text2);transition:all 0.15s;font-size:16px}
.btn-icon:hover{background:var(--bg4);color:var(--text)}
.content{flex:1;overflow-y:auto;padding:24px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600}
.card-sub{font-size:12px;color:var(--text3);margin-top:2px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:18px;position:relative;overflow:hidden}
.metric-label{font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.metric-value{font-size:28px;font-weight:700;margin:4px 0 2px;line-height:1}
.metric-icon{position:absolute;right:16px;top:16px;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-pending{background:rgba(245,158,26,0.15);color:var(--amber)}
.badge-progress{background:rgba(79,142,247,0.15);color:var(--blue)}
.badge-done{background:rgba(62,207,106,0.15);color:var(--green)}
.badge-overdue{background:rgba(240,80,80,0.15);color:var(--red)}
.badge-cancelled{background:rgba(92,98,114,0.15);color:var(--text3)}
.badge-approval{background:rgba(167,139,250,0.15);color:var(--purple)}
.badge-admin{background:rgba(255,107,53,0.15);color:#ff6b35}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;color:var(--text3);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.progress-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width 0.3s}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;background:var(--bg4);color:var(--text2);margin-right:4px}
.input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:13px;color:var(--text);font-family:inherit;width:100%;outline:none;transition:border 0.15s}
.input:focus{border-color:var(--blue)}
.select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:13px;color:var(--text);font-family:inherit;outline:none;cursor:pointer}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text3);margin-bottom:5px;font-weight:500}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius3);padding:24px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:17px;font-weight:700}
.tabs{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:var(--radius);margin-bottom:20px}
.tab{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.15s}
.tab.active{background:var(--bg);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.notification-dot{width:8px;height:8px;background:var(--red);border-radius:50%;position:absolute;top:-2px;right:-2px}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.search-box{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:10px;color:var(--text3);font-size:15px}
.divider{height:1px;background:var(--border);margin:16px 0}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.kanban{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px;align-items:flex-start}
.kanban-col{min-width:240px;background:var(--bg3);border-radius:var(--radius2);padding:12px}
.kanban-col-header{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.kanban-count{background:var(--bg4);color:var(--text3);font-size:11px;padding:2px 7px;border-radius:10px}
.kanban-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.kanban-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:20px}
.login-card{width:100%;max-width:440px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius3);padding:36px}
.login-brand{text-align:center;margin-bottom:28px}
.login-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px}
.user-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px;cursor:pointer;transition:all 0.15s;text-align:center}
.user-btn:hover{border-color:var(--blue);background:rgba(79,142,247,0.05)}
.user-btn.selected{border-color:var(--blue);background:rgba(79,142,247,0.1)}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text2)}
.perf-bar{height:8px;border-radius:4px;background:var(--bg4);overflow:hidden;margin-top:4px}
.perf-fill{height:100%;border-radius:4px}
.employee-perf-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.employee-perf-row:last-child{border-bottom:none}
.rank-badge{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.activity-content{flex:1}
.activity-time{font-size:11px;color:var(--text3)}
.notif-panel{position:fixed;top:0;right:0;height:100vh;width:340px;background:var(--bg2);border-left:1px solid var(--border);z-index:500;transform:translateX(100%);transition:transform 0.3s;overflow-y:auto;padding:20px}
.notif-panel.open{transform:translateX(0)}
.notif-item{padding:12px;border-radius:var(--radius);background:var(--bg3);margin-bottom:8px;cursor:pointer}
.notif-item.unread{border-left:3px solid var(--blue)}
.profile-avatar-big{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;margin:0 auto 12px;cursor:pointer;border:3px solid var(--border)}
.alert-success{background:rgba(62,207,106,0.1);border:1px solid rgba(62,207,106,0.3);color:var(--green);padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:12px}
.alert-error{background:rgba(240,80,80,0.1);border:1px solid rgba(240,80,80,0.3);color:var(--red);padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:12px}
</style>
</head>

// ─── HELPERS ───────────────────────────────────────────────────
function fmtDate(d){if(!d)return '-';try{return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return d}}
function daysDiff(d){if(!d)return 0;return Math.ceil((new Date(d)-new Date())/86400000)}
function initials(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}

function Avatar({user,size=30}){
  if(!user)return null;
  const u=typeof user==='string'?null:user;
  const color=u?u.color:'#4f8ef7';
  const av=u?u.avatar:'??';
  return <div style={{width:size,height:size,borderRadius:'50%',background:color+'22',color:color,fontSize:size*0.36,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,flexShrink:0}}>{av}</div>
}
function UserAvatar({userId,users,size=30}){
  const u=users.find(x=>x.id===userId);
  if(!u)return null;
  return <Avatar user={u} size={size}/>
}

function StatusBadge({status}){
  const map={Pending:'badge-pending','In Progress':'badge-progress','Waiting for Approval':'badge-approval',Completed:'badge-done',Overdue:'badge-overdue',Rejected:'badge-cancelled',Cancelled:'badge-cancelled'};
  return <span className={`badge ${map[status]||'badge-cancelled'}`}>{status}</span>
}
function PriorityBadge({p}){
  const map={Critical:'#ff6b35',High:'#f05050',Medium:'#f59e1a',Low:'#3ecf6a'};
  return <span style={{color:map[p],fontSize:12,fontWeight:600}}>{p}</span>
}
function RoleBadge({role}){
  const map={admin:{cls:'badge-admin',label:'👑 Admin'},manager:{cls:'badge-progress',label:'👔 Manager'},employee:{cls:'badge-done',label:'👤 Employee'}};
  const r=map[role]||map.employee;
  return <span className={`badge ${r.cls}`}>{r.label}</span>
}

function Modal({open,onClose,title,children,width=580}){
  if(!open)return null;
  return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal" style={{maxWidth:width}}>
      <div className="modal-header">
        <span className="modal-title">{title}</span>

      </div>
      {children}
    </div>
  </div>
}

function DonutChart({values,colors,size=100,thickness=16}){
  const total=values.reduce((a,b)=>a+b,0)||1;
  let offset=0;
  const r=(size/2)-thickness/2;
  const circ=2*Math.PI*r;
  const segs=values.map((v,i)=>{
    const dash=(v/total)*circ;
    const seg=<circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={colors[i]} strokeWidth={thickness} strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-offset}/>
    offset+=dash;return seg;
  });
  return <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>{segs}</svg>
}
function BarChart({data}){
  const max=Math.max(...data.map(d=>d.val),1);
  return <div>{data.map((d,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
    <span style={{fontSize:12,color:'var(--text2)',minWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.label}</span>
    <div style={{flex:1,height:20,background:'var(--bg4)',borderRadius:4,overflow:'hidden'}}>
      <div style={{width:`${(d.val/max)*100}%`,height:'100%',background:d.color||'var(--blue)',borderRadius:4}}/>
    </div>
    <span style={{fontSize:12,color:'var(--text3)',minWidth:20}}>{d.val}</span>
  </div>)}</div>
}

function ProfilePage({currentUser,users,setUsers,setLogs,onUserUpdate}){
  const [tab,setTab]=useState('profile');
  const [form,setForm]=useState({name:currentUser.name,email:currentUser.email,mobile:currentUser.mobile,whatsapp:currentUser.whatsapp,designation:currentUser.designation,dept:currentUser.dept,avatar:currentUser.avatar,color:currentUser.color});
  const [pwForm,setPwForm]=useState({current:'',newPw:'',confirm:''});
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');

  function saveProfile(){
    if(!form.name.trim()){setErr('Name is required');return}
    if(!form.email.trim()){setErr('Email is required');return}
    const updated={...currentUser,...form,avatar:initials(form.name)};
    setUsers(prev=>prev.map(u=>u.id===currentUser.id?updated:u));
    onUserUpdate(updated);
    setMsg('Profile updated successfully!');setErr('');
    setLogs(p=>[{time:new Date().toISOString().slice(0,16).replace('T',' '),user:currentUser.id,action:'Updated profile',type:'profile'},...p]);
    setTimeout(()=>setMsg(''),3000);
  }
  function changePassword(){
    if(pwForm.current!==currentUser.password){setErr('Current password is incorrect');return}
    if(pwForm.newPw.length<6){setErr('New password must be at least 6 characters');return}
    if(pwForm.newPw!==pwForm.confirm){setErr('New passwords do not match');return}
    const updated={...currentUser,password:pwForm.newPw};
    setUsers(prev=>prev.map(u=>u.id===currentUser.id?updated:u));
    onUserUpdate(updated);
    setPwForm({current:'',newPw:'',confirm:''});
    setMsg('Password changed successfully!');setErr('');
    setLogs(p=>[{time:new Date().toISOString().slice(0,16).replace('T',' '),user:currentUser.id,action:'Changed password',type:'security'},...p]);
    setTimeout(()=>setMsg(''),3000);
  }

  return <div style={{maxWidth:600}}>
    <div className="tabs" style={{marginBottom:20}}>
      {[['profile','👤 Edit Profile'],['password','🔒 Change Password']].map(([k,l])=><div key={k} className={`tab${tab===k?' active':''}`} onClick={()=>{setTab(k);setMsg('');setErr('')}}>{l}</div>)}

    {msg&&<div className="alert-success">✅ {msg}</div>}
    {err&&<div className="alert-error">❌ {err}</div>}

    {tab==='profile'&&<div className="card">
      <div style={{textAlign:'center',marginBottom:20}}>
        <div className="profile-avatar-big" style={{background:form.color+'22',color:form.color,width:80,height:80,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,fontWeight:700,margin:'0 auto 8px'}}>
          {initials(form.name||'U')}
        </div>
        <div style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>Avatar color:</div>
        <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
          {COLORS.map(c=><div key={c} onClick={()=>setForm(f=>({...f,color:c}))} style={{width:24,height:24,borderRadius:'50%',background:c,cursor:'pointer',border:form.color===c?'3px solid white':'3px solid transparent',transition:'all 0.15s'}}/>)}
        </div>
      </div>
      <div className="grid-2">
        <div className="form-group"><label className="form-label">Full Name *</label><input className="input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Email *</label><input className="input" type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Mobile</label><input className="input" value={form.mobile} onChange={e=>setForm(f=>({...f,mobile:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">WhatsApp</label><input className="input" value={form.whatsapp} onChange={e=>setForm(f=>({...f,whatsapp:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Designation</label><input className="input" value={form.designation} onChange={e=>setForm(f=>({...f,designation:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Department</label>
          <select className="select input" value={form.dept} onChange={e=>setForm(f=>({...f,dept:e.target.value}))}>
            {DEPTS.map(d=><option key={d}>{d}</option>)}
          </select>
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'flex-end',marginTop:8}}>
        <button className="btn btn-primary" onClick={saveProfile}>💾 Save Profile</button>
      </div>
    </div>}

    {tab==='password'&&<div className="card">
      <div style={{marginBottom:16,padding:'12px',background:'rgba(79,142,247,0.05)',border:'1px solid rgba(79,142,247,0.2)',borderRadius:'var(--radius)',fontSize:13,color:'var(--text2)'}}>
        🔐 Password must be at least 6 characters long.

      <div style={{display:'flex',justifyContent:'flex-end'}}>
        <button className="btn btn-primary" onClick={changePassword}>🔒 Change Password</button>

    </div>}

    if(!form.name||!form.email||!form.password){return}

      setUsers(prev=>prev.map(u=>u.id===editUser.id?{...u,...form,avatar:initials(form.name)}:u));

      </div>

      <div className="form-group"><label className="form-label">Mobile</label><input className="input" value={form.mobile} onChange={e=>f('mobile',e.target.value)}/></div>
      <div className="form-group"><label className="form-label">WhatsApp</label><input className="input" value={form.whatsapp} onChange={e=>f('whatsapp',e.target.value)}/></div>

// ─── TASK LIST ────────────────────────────────────────────────
function TaskList({tasks,setTasks,currentUser,users,setLogs}){
  const [view,setView]=useState('list');

  const [selTask,setSelTask]=useState(null);
  const isAdmin=currentUser.role==='admin';
  const isManager=currentUser.role==='manager';
  const canDelete=isAdmin||isManager;
  const canCreate=isAdmin||isManager;
  const [confirmDel,setConfirmDel]=useState(null);

  const filtered=tasks.filter(t=>{
    if(currentUser.role==='employee'&&!t.assignedTo.includes(currentUser.id))return false;
    if(filter.status&&t.status!==filter.status)return false;
    if(filter.priority&&t.priority!==filter.priority)return false;
    if(filter.search&&!t.title.toLowerCase().includes(filter.search.toLowerCase()))return false;
    return true;
  });

    setTasks(prev=>prev.map(t=>t.id===id?{...t,...updates}:t));

  }

    setTasks(prev=>prev.filter(x=>x.id!==t.id));

            <thead><tr><th>Task ID</th><th>Title</th><th>Priority</th><th>Assigned To</th><th>Due Date</th><th>Progress</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {!filtered.length?<tr><td colSpan={8} style={{textAlign:'center',padding:'32px',color:'var(--text3)'}}>No tasks found</td></tr>:
              filtered.map(t=><tr key={t.id}>
                <td><code style={{fontSize:11,color:'var(--text3)'}}>{t.id}</code></td>
                <td><div style={{fontSize:13,fontWeight:500,cursor:'pointer',color:'var(--blue)'}} onClick={()=>setSelTask(t)}>{t.title}</div><div style={{fontSize:11,color:'var(--text3)'}}>{t.category} · {t.dept}</div></td>
                <td><PriorityBadge p={t.priority}/></td>
                <td><div style={{display:'flex'}}>{t.assignedTo.slice(0,3).map(uid=><UserAvatar key={uid} userId={uid} users={users} size={26}/>)}</div></td>
                <td style={{fontSize:12,color:daysDiff(t.dueDate)<0?'var(--red)':daysDiff(t.dueDate)<=3?'var(--amber)':'var(--text2)'}}>{fmtDate(t.dueDate)}</td>
                <td style={{minWidth:100}}>
                  <div className="progress-bar"><div className="progress-fill" style={{width:`${t.progress}%`,background:t.progress===100?'var(--green)':t.progress>50?'var(--blue)':'var(--amber)'}}/></div>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{t.progress}%</div>
                </td>
                <td><StatusBadge status={t.status}/></td>
                <td>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                    <button className="btn btn-secondary btn-sm" onClick={()=>setSelTask(t)}>✏️ Edit</button>
                    {(isAdmin||isManager)&&t.status==='Waiting for Approval'&&<button className="btn btn-primary btn-sm" onClick={()=>updateTask(t.id,{status:'Completed',completedDate:new Date().toISOString().slice(0,10)})}>✓ Approve</button>}
                    {canDelete&&<button className="btn btn-danger btn-sm" onClick={()=>setConfirmDel(t)}>🗑</button>}
                  </div>
                </td>
              </tr>)}
            </tbody>
          </table>
        </div>
      </div>}

    {showCreate&&<CreateTaskModal onClose={()=>setShowCreate(false)} users={users} currentUser={currentUser} onSave={task=>{setTasks(p=>[task,...p]);setLogs(p=>[{time:new Date().toISOString().slice(0,16).replace('T',' '),user:currentUser.id,action:`Created task ${task.id}: ${task.title}`,type:'assign'},...p]);setShowCreate(false)}}/>}
    {selTask&&<TaskDetailModal task={selTask} onClose={()=>setSelTask(null)} onUpdate={updates=>{updateTask(selTask.id,updates);setSelTask(null)}} currentUser={currentUser} users={users}/>}

    {confirmDel&&<Modal open title="Delete Task" onClose={()=>setConfirmDel(null)} width={420}>
      <div style={{textAlign:'center',padding:'8px 0 20px'}}>
        <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
        <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>Delete "{confirmDel.title}"?</div>
        <div style={{fontSize:13,color:'var(--text3)',marginBottom:20}}>This action cannot be undone.</div>
        <div style={{display:'flex',gap:8,justifyContent:'center'}}>
          <button className="btn btn-secondary" onClick={()=>setConfirmDel(null)}>Cancel</button>
          <button className="btn btn-danger" onClick={()=>deleteTask(confirmDel)}>Yes, Delete</button>
        </div>
      </div>
    </Modal>}
  </div>
}

// ─── CREATE TASK ──────────────────────────────────────────────
function CreateTaskModal({onClose,onSave,users,currentUser}){
  const employees=users.filter(u=>u.role!=='admin'&&u.status==='Active');
  const [form,setForm]=useState({title:'',desc:'',category:'Finance',dept:'Finance',priority:'High',assignedTo:[],startDate:'',dueDate:'',expectedHours:8,fy:'2024-25'});
  const [err,setErr]=useState('');
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const toggle=id=>setForm(p=>({...p,assignedTo:p.assignedTo.includes(id)?p.assignedTo.filter(x=>x!==id):[...p.assignedTo,id]}));
  function save(){
    if(!form.title.trim()){setErr('Title required');return}
    if(!form.assignedTo.length){setErr('Assign to at least one employee');return}
    if(!form.dueDate){setErr('Due date required');return}
    onSave({...form,id:'T'+String(Math.floor(Math.random()*9000)+1000),assignedBy:currentUser.id,assignedDate:new Date().toISOString().slice(0,10),progress:0,status:'Pending',comments:[],reviewNotes:'',actualHours:0,completedDate:null});
  }
  return <Modal open title="Create New Task" onClose={onClose}>
    <div className="form-group"><label className="form-label">Task Title *</label><input className="input" value={form.title} onChange={e=>f('title',e.target.value)}/></div>
    <div className="form-group"><label className="form-label">Description</label><textarea className="input" rows={3} value={form.desc} onChange={e=>f('desc',e.target.value)} style={{resize:'vertical'}}/></div>
    <div className="grid-2">
      <div className="form-group"><label className="form-label">Category</label><select className="select input" value={form.category} onChange={e=>f('category',e.target.value)}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
      <div className="form-group"><label className="form-label">Department</label><select className="select input" value={form.dept} onChange={e=>f('dept',e.target.value)}>{DEPTS.map(d=><option key={d}>{d}</option>)}</select></div>
      <div className="form-group"><label className="form-label">Priority</label><select className="select input" value={form.priority} onChange={e=>f('priority',e.target.value)}>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select></div>
      <div className="form-group"><label className="form-label">Due Date *</label><input className="input" type="date" value={form.dueDate} onChange={e=>f('dueDate',e.target.value)}/></div>
      <div className="form-group"><label className="form-label">Start Date</label><input className="input" type="date" value={form.startDate} onChange={e=>f('startDate',e.target.value)}/></div>
      <div className="form-group"><label className="form-label">Expected Hours</label><input className="input" type="number" value={form.expectedHours} onChange={e=>f('expectedHours',+e.target.value)}/></div>
    </div>
    <div className="form-group">
      <label className="form-label">Assign To * (select one or more)</label>
      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
        {employees.map(u=><div key={u.id} onClick={()=>toggle(u.id)} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',border:`1px solid ${form.assignedTo.includes(u.id)?u.color:'var(--border)'}`,background:form.assignedTo.includes(u.id)?u.color+'15':'var(--bg3)',borderRadius:'var(--radius)',cursor:'pointer'}}>
          <div style={{width:22,height:22,borderRadius:'50%',background:u.color+'22',color:u.color,fontSize:9,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{u.avatar}</div>
          <span style={{fontSize:12}}>{u.name.split(' ')[0]}</span>
        </div>)}
      </div>
    </div>
    {err&&<div className="alert-error">{err}</div>}
    <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
      <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
      <button className="btn btn-primary" onClick={save}>Create Task</button>
    </div>
  </Modal>
}

// ─── TASK DETAIL / EDIT ───────────────────────────────────────
function TaskDetailModal({task,onClose,onUpdate,currentUser,users}){
  const [comment,setComment]=useState('');
  const [form,setForm]=useState({
    title:task.title,desc:task.desc,category:task.category,dept:task.dept,
    priority:task.priority,dueDate:task.dueDate,expectedHours:task.expectedHours,
    actualHours:task.actualHours,progress:task.progress,status:task.status,
    reviewNotes:task.reviewNotes||'',assignedTo:task.assignedTo
  });
  const [comments,setComments]=useState(task.comments||[]);
  const isAdmin=currentUser.role==='admin';
  const isManager=currentUser.role==='manager';
  const isAssigned=task.assignedTo.includes(currentUser.id);
  const canApprove=isAdmin||isManager;
  const employees=users.filter(u=>u.role!=='admin'&&u.status==='Active');

  function addComment(){
    if(!comment.trim())return;
    setComments(p=>[...p,{user:currentUser.id,text:comment,time:new Date().toISOString().slice(0,16).replace('T',' ')}]);
    setComment('');
  }
  function save(){
    onUpdate({...form,comments,completedDate:form.status==='Completed'?new Date().toISOString().slice(0,10):task.completedDate});
  }
  const toggle=id=>setForm(p=>({...p,assignedTo:p.assignedTo.includes(id)?p.assignedTo.filter(x=>x!==id):[...p.assignedTo,id]}));

  return <Modal open title={`Edit Task — ${task.id}`} onClose={onClose} width={680}>
    <div className="tabs" style={{marginBottom:16}}>
      {['details','assignment','comments'].map(t=><div key={t} id={`ttab_${t}`} className="tab" style={{}} onClick={e=>{document.querySelectorAll('[id^=ttab_]').forEach(x=>x.classList.remove('active'));e.target.classList.add('active');document.querySelectorAll('[id^=tpanel_]').forEach(x=>x.style.display='none');document.getElementById(`tpanel_${t}`).style.display='block'}}>{t.charAt(0).toUpperCase()+t.slice(1)}</div>}
      </div>}
      <script dangerouslySetInnerHTML={{__html:'document.getElementById("ttab_details").classList.add("active");document.getElementById("tpanel_assignment").style.display="none";document.getElementById("tpanel_comments").style.display="none";'}}/>

    <div id="tpanel_details">
      <div className="form-group"><label className="form-label">Task Title</label><input className="input" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}/></div>
      <div className="form-group"><label className="form-label">Description</label><textarea className="input" rows={3} value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} style={{resize:'vertical'}}/></div>
      <div className="grid-2">
        <div className="form-group"><label className="form-label">Category</label><select className="select input" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
        <div className="form-group"><label className="form-label">Department</label><select className="select input" value={form.dept} onChange={e=>setForm(f=>({...f,dept:e.target.value}))}>{DEPTS.map(d=><option key={d}>{d}</option>)}</select></div>
        <div className="form-group"><label className="form-label">Priority</label><select className="select input" value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))}>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select></div>
        <div className="form-group"><label className="form-label">Status</label><select className="select input" value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
        <div className="form-group"><label className="form-label">Due Date</label><input className="input" type="date" value={form.dueDate} onChange={e=>setForm(f=>({...f,dueDate:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Actual Hours</label><input className="input" type="number" value={form.actualHours} onChange={e=>setForm(f=>({...f,actualHours:+e.target.value}))}/></div>
      </div>
      <div className="form-group">
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <label className="form-label" style={{marginBottom:0}}>Progress: {form.progress}%</label>
        </div>
        <input type="range" min={0} max={100} step={5} value={form.progress} onChange={e=>setForm(f=>({...f,progress:+e.target.value}))} style={{width:'100%'}}/>
        <div className="progress-bar" style={{height:8,marginTop:4}}><div className="progress-fill" style={{width:`${form.progress}%`,background:form.progress===100?'var(--green)':form.progress>50?'var(--blue)':'var(--amber)'}}/></div>
      </div>
      {canApprove&&<div className="form-group"><label className="form-label">Review Notes</label><textarea className="input" rows={2} value={form.reviewNotes} onChange={e=>setForm(f=>({...f,reviewNotes:e.target.value}))} style={{resize:'vertical'}}/></div>}
    </div>

    <div id="tpanel_assignment" style={{display:'none'}}>
      <div style={{marginBottom:12,fontSize:13,color:'var(--text2)'}}>Assigned to:</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
        {employees.map(u=><div key={u.id} onClick={()=>toggle(u.id)} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 12px',border:`1px solid ${form.assignedTo.includes(u.id)?u.color:'var(--border)'}`,background:form.assignedTo.includes(u.id)?u.color+'15':'var(--bg3)',borderRadius:'var(--radius)',cursor:'pointer'}}>
          <div style={{width:26,height:26,borderRadius:'50%',background:u.color+'22',color:u.color,fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{u.avatar}</div>
          <span style={{fontSize:12,fontWeight:500}}>{u.name}</span>
          {form.assignedTo.includes(u.id)&&<span style={{color:u.color,fontSize:14}}>✓</span>}
        </div>)}
      </div>
    </div>

    <div id="tpanel_comments" style={{display:'none'}}>
      <div style={{maxHeight:280,overflowY:'auto',marginBottom:12}}>
        {!comments.length?<div className="empty-state" style={{padding:'20px 0'}}>No comments yet</div>:
          comments.map((c,i)=>{const u=users.find(x=>x.id===c.user);return <div key={i} style={{display:'flex',gap:8,marginBottom:10,padding:10,background:'var(--bg3)',borderRadius:'var(--radius)'}}>
            {u&&<div style={{width:30,height:30,borderRadius:'50%',background:u.color+'22',color:u.color,fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,flexShrink:0}}>{u.avatar}</div>}
            <div><div style={{fontSize:12,fontWeight:600}}>{u?.name||'Unknown'} <span style={{fontSize:11,color:'var(--text3)',fontWeight:400}}>{c.time}</span></div><div style={{fontSize:13,color:'var(--text2)',marginTop:2}}>{c.text}</div></div>
          </div>})}
      </div>
      <div style={{display:'flex',gap:8}}>
        <input className="input" placeholder="Add a comment..." value={comment} onChange={e=>setComment(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addComment()} style={{flex:1}}/>
        <button className="btn btn-primary btn-sm" onClick={addComment}>Post</button>
      </div>
    </div>

    <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16,paddingTop:16,borderTop:'1px solid var(--border)'}}>
      <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
      <button className="btn btn-primary" onClick={save}>💾 Save Changes</button>
    </div>
  </Modal>
}

// ─── DASHBOARDS ───────────────────────────────────────────────
function ManagerDashboard({tasks,logs,users}){
  const employees=users.filter(u=>u.role==='employee');
  const st={Pending:0,'In Progress':0,Completed:0,Overdue:0,'Waiting for Approval':0};
  tasks.forEach(t=>{if(st[t.status]!==undefined)st[t.status]++});
  const empPerf=employees.map(e=>{
    const a=tasks.filter(t=>t.assignedTo.includes(e.id));
    const d=a.filter(t=>t.status==='Completed');
    const o=a.filter(t=>t.status==='Overdue');
    return{...e,assigned:a.length,done:d.length,overdue:o.length,rate:a.length?Math.round((d.length/a.length)*100):0};
  }).sort((a,b)=>b.rate-a.rate);
  const deptData=DEPTS.slice(0,6).map((d,i)=>({label:d,val:tasks.filter(t=>t.dept===d).length,color:COLORS[i]}));
  return <div>
    <div className="grid-4" style={{marginBottom:20}}>
      {[{l:'Total Tasks',v:tasks.length,ic:'📋',c:'var(--blue)',bg:'rgba(79,142,247,0.1)'},{l:'In Progress',v:st['In Progress'],ic:'⚡',c:'var(--amber)',bg:'rgba(245,158,26,0.1)'},{l:'Completed',v:st.Completed,ic:'✅',c:'var(--green)',bg:'rgba(62,207,106,0.1)'},{l:'Overdue',v:st.Overdue,ic:'🚨',c:'var(--red)',bg:'rgba(240,80,80,0.1)'}].map((m,i)=><div key={i} className="metric-card">
        <div className="metric-icon" style={{background:m.bg,fontSize:18}}>{m.ic}</div>
        <div className="metric-label">{m.l}</div>
        <div className="metric-value" style={{color:m.c}}>{m.v}</div>
      </div>)}
    </div>
    <div className="grid-2" style={{marginBottom:20}}>
      <div className="card">
        <div className="card-header"><span className="card-title">Task Status Overview</span></div>
        <div style={{display:'flex',gap:20,alignItems:'center'}}>
          <DonutChart values={[st.Pending,st['In Progress'],st.Completed,st.Overdue,st['Waiting for Approval']]} colors={['#f59e1a','#4f8ef7','#3ecf6a','#f05050','#a78bfa']}/>
          <div style={{flex:1}}>
            {[['Pending',st.Pending,'#f59e1a'],['In Progress',st['In Progress'],'#4f8ef7'],['Completed',st.Completed,'#3ecf6a'],['Overdue',st.Overdue,'#f05050'],['For Approval',st['Waiting for Approval'],'#a78bfa']].map(([l,v,c])=><div key={l} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <div style={{width:8,height:8,borderRadius:2,background:c}}/><span style={{fontSize:12,color:'var(--text2)',flex:1}}>{l}</span><span style={{fontSize:13,fontWeight:600}}>{v}</span>
            </div>)}
          </div>
        </div>
      </div>
      <div className="card"><div className="card-header"><span className="card-title">Department Workload</span></div><BarChart data={deptData.filter(d=>d.val>0)}/></div>
    </div>
    <div className="card" style={{marginBottom:20}}>
      <div className="card-header"><div><div className="card-title">Employee Performance Rankings</div><div className="card-sub">FY 2024-25</div></div></div>
      {empPerf.map((e,i)=><div key={e.id} className="employee-perf-row">
        <div className="rank-badge" style={{background:i===0?'#f59e1a22':i===1?'#9ca3b022':'var(--bg4)',color:i===0?'#f59e1a':i===1?'var(--text3)':'var(--text3)'}}>{i+1}</div>
        <Avatar user={e} size={32}/>
        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{e.name}</div><div style={{fontSize:11,color:'var(--text3)'}}>{e.dept}</div>
          <div className="perf-bar" style={{marginTop:4,width:180}}><div className="perf-fill" style={{width:`${e.rate}%`,background:e.rate>=80?'var(--green)':e.rate>=50?'var(--amber)':'var(--red)'}}/></div>
        </div>
        <div style={{textAlign:'right'}}><div style={{fontSize:18,fontWeight:700,color:e.rate>=80?'var(--green)':e.rate>=50?'var(--amber)':'var(--red)'}}>{e.rate}%</div><div style={{fontSize:11,color:'var(--text3)'}}>{e.done}/{e.assigned}</div></div>
      </div>)}
    </div>
    <div className="grid-2">
      <div className="card">
        <div className="card-header"><span className="card-title">Recent Activity</span></div>
        {logs.slice(0,5).map((l,i)=>{const u=users.find(x=>x.id===l.user);return <div key={i} className="activity-item">
          <div className="activity-dot" style={{background:l.type==='task'?'var(--green)':l.type==='assign'?'var(--blue)':l.type==='delete'?'var(--red)':l.type==='admin'?'#ff6b35':'var(--amber)'}}/>
          <div className="activity-content"><div style={{fontSize:13}}>{l.action}</div><div className="activity-time">{u?.name||l.user} · {l.time}</div></div>
        </div>})}
      </div>
      <div className="card">
        <div className="card-header"><span className="card-title">Upcoming Deadlines</span></div>
        {tasks.filter(t=>t.status!=='Completed'&&t.status!=='Cancelled').sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate)).slice(0,5).map(t=>{
          const d=daysDiff(t.dueDate);
          return <div key={t.id} className="stat-row">
            <div><div style={{fontSize:13,fontWeight:500}}>{t.title}</div><div style={{fontSize:11,color:'var(--text3)'}}>{t.dept}</div></div>
            <div style={{textAlign:'right'}}><div style={{fontSize:12,color:d<0?'var(--red)':d<=3?'var(--amber)':'var(--text3)'}}>{d<0?`${Math.abs(d)}d overdue`:d===0?'Today':`${d}d left`}</div><StatusBadge status={t.status}/></div>
          </div>
        })}
      </div>
    </div>
  </div>
}

function EmployeeDashboard({emp,tasks}){
  const myTasks=tasks.filter(t=>t.assignedTo.includes(emp.id));
  const done=myTasks.filter(t=>t.status==='Completed');
  const overdue=myTasks.filter(t=>t.status==='Overdue');
  const inprog=myTasks.filter(t=>t.status==='In Progress');
  const pending=myTasks.filter(t=>t.status==='Pending');
  const rate=myTasks.length?Math.round((done.length/myTasks.length)*100):0;
  return <div>
    <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:24,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius2)',padding:20}}>
      <div style={{width:56,height:56,borderRadius:'50%',background:emp.color+'22',color:emp.color,fontSize:20,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{emp.avatar}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:20,fontWeight:700}}>{emp.name}</div>
        <div style={{fontSize:13,color:'var(--text3)'}}>{emp.designation} · {emp.dept}</div>
        <div style={{display:'flex',gap:12,marginTop:8,flexWrap:'wrap'}}>
          <span className="chip">📧 {emp.email}</span><span className="chip">📱 {emp.mobile}</span>
        </div>
      </div>
      <div style={{textAlign:'center',background:'var(--bg3)',borderRadius:'var(--radius2)',padding:'16px 24px'}}>
        <div style={{fontSize:32,fontWeight:800,color:rate>=80?'var(--green)':rate>=50?'var(--amber)':'var(--red)'}}>{rate}%</div>
        <div style={{fontSize:12,color:'var(--text3)'}}>Completion Rate</div>
      </div>
    </div>
    <div className="grid-4" style={{marginBottom:20}}>
      {[{l:'Assigned',v:myTasks.length,c:'var(--blue)',bg:'rgba(79,142,247,0.1)',i:'📋'},{l:'In Progress',v:inprog.length,c:'var(--amber)',bg:'rgba(245,158,26,0.1)',i:'⚡'},{l:'Completed',v:done.length,c:'var(--green)',bg:'rgba(62,207,106,0.1)',i:'✅'},{l:'Overdue',v:overdue.length,c:'var(--red)',bg:'rgba(240,80,80,0.1)',i:'🚨'}].map((m,i)=><div key={i} className="metric-card">
        <div className="metric-icon" style={{background:m.bg,fontSize:16}}>{m.i}</div>
        <div className="metric-label">{m.l}</div>
        <div className="metric-value" style={{color:m.c,fontSize:22}}>{m.v}</div>
      </div>)}
    </div>
    <div className="card" style={{marginBottom:20}}>
      <div className="card-header"><span className="card-title">My Active Tasks</span></div>
      {!myTasks.filter(t=>t.status!=='Completed'&&t.status!=='Cancelled').length?<div className="empty-state"><div style={{fontSize:40,marginBottom:8}}>🎉</div>All caught up!</div>:
        myTasks.filter(t=>t.status!=='Completed'&&t.status!=='Cancelled').map(t=><div key={t.id} style={{padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
            <div><div style={{fontSize:13,fontWeight:600}}>{t.title}</div><div style={{fontSize:11,color:'var(--text3)'}}>{t.id} · {t.dept}</div></div>
            <div style={{display:'flex',gap:6}}><PriorityBadge p={t.priority}/><StatusBadge status={t.status}/></div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div className="progress-bar" style={{flex:1}}><div className="progress-fill" style={{width:`${t.progress}%`,background:t.progress===100?'var(--green)':t.progress>50?'var(--blue)':'var(--amber)'}}/></div>
            <span style={{fontSize:11,color:'var(--text3)'}}>{t.progress}%</span>
            <span style={{fontSize:11,color:daysDiff(t.dueDate)<0?'var(--red)':daysDiff(t.dueDate)<=3?'var(--amber)':'var(--text3)'}}>Due {fmtDate(t.dueDate)}</span>
          </div>
        </div>)}
    </div>
    <div className="grid-2">
      <div className="card"><div className="card-header"><span className="card-title">Performance Stats</span></div>
        {[['Assigned',myTasks.length],['Completed',done.length],['Pending',pending.length],['Overdue',overdue.length],['Completion Rate',rate+'%']].map(([k,v])=><div key={k} className="stat-row"><span style={{fontSize:13,color:'var(--text2)'}}>{k}</span><span style={{fontSize:13,fontWeight:600}}>{v}</span></div>)}
      </div>
      <div className="card"><div className="card-header"><span className="card-title">Recently Completed</span></div>
        {!done.length?<div className="empty-state">No completed tasks yet</div>:done.slice(0,4).map(t=><div key={t.id} className="stat-row">
          <div><div style={{fontSize:13,fontWeight:500}}>{t.title}</div><div style={{fontSize:11,color:'var(--text3)'}}>{fmtDate(t.completedDate)}</div></div>
          <StatusBadge status={t.status}/>
        </div>)}
      </div>
    </div>
  </div>
}

function ReportsPage({tasks,users}){
  const [rtype,setRtype]=useState('performance');
  const employees=users.filter(u=>u.role==='employee');
  const perfData=employees.map(e=>{
    const et=tasks.filter(t=>t.assignedTo.includes(e.id));
    const done=et.filter(t=>t.status==='Completed');
    const overdue=et.filter(t=>t.status==='Overdue');
    return{...e,total:et.length,done:done.length,overdue:overdue.length,rate:et.length?Math.round((done.length/et.length)*100):0};
  }).sort((a,b)=>b.rate-a.rate);
  const deptData=DEPTS.map(d=>({dept:d,total:tasks.filter(t=>t.dept===d).length,done:tasks.filter(t=>t.dept===d&&t.status==='Completed').length})).filter(d=>d.total>0);
  return <div>
    <div className="tabs" style={{marginBottom:20}}>
      {[['performance','👤 Performance'],['dept','🏢 Department'],['fy','📊 FY Report']].map(([k,l])=><div key={k} className={`tab${rtype===k?' active':''}`} onClick={()=>setRtype(k)}>{l}</div>)}
    </div>
    {rtype==='performance'&&<div className="card">
      <div className="card-header"><div><div className="card-title">Employee Performance Report</div><div className="card-sub">FY 2024-25</div></div></div>
      <div className="table-wrap"><table>
        <thead><tr><th>Rank</th><th>Employee</th><th>Dept</th><th>Total</th><th>Done</th><th>Overdue</th><th>Rate</th><th>Grade</th></tr></thead>
        <tbody>{perfData.map((e,i)=><tr key={e.id}>
          <td><div className="rank-badge" style={{background:i<3?'#f59e1a22':'var(--bg4)',color:i<3?'#f59e1a':'var(--text3)'}}>{i+1}</div></td>
          <td><div style={{display:'flex',alignItems:'center',gap:8}}><Avatar user={e} size={28}/><div><div style={{fontSize:13,fontWeight:500}}>{e.name}</div><div style={{fontSize:11,color:'var(--text3)'}}>{e.designation}</div></div></div></td>
          <td><span className="tag">{e.dept}</span></td>
          <td>{e.total}</td><td style={{color:'var(--green)',fontWeight:600}}>{e.done}</td><td style={{color:'var(--red)',fontWeight:600}}>{e.overdue}</td>
          <td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="progress-bar" style={{width:80}}><div className="progress-fill" style={{width:`${e.rate}%`,background:e.rate>=80?'var(--green)':e.rate>=50?'var(--amber)':'var(--red)'}}/></div><span style={{fontSize:12,fontWeight:600}}>{e.rate}%</span></div></td>
          <td><span style={{fontSize:14,fontWeight:700,color:e.rate>=80?'var(--green)':e.rate>=50?'var(--amber)':'var(--red)'}}>{e.rate>=80?'A':e.rate>=60?'B':e.rate>=40?'C':'D'}</span></td>
        </tr>)}</tbody>
      </table></div>
    </div>}
    {rtype==='dept'&&<div className="card">
      <div className="card-header"><div className="card-title">Department Report</div></div>
      <div className="table-wrap"><table>
        <thead><tr><th>Department</th><th>Total</th><th>Completed</th><th>Pending</th><th>Rate</th></tr></thead>
        <tbody>{deptData.map(d=><tr key={d.dept}>
          <td style={{fontWeight:500}}>{d.dept}</td><td>{d.total}</td>
          <td style={{color:'var(--green)',fontWeight:600}}>{d.done}</td>
          <td style={{color:'var(--amber)',fontWeight:600}}>{d.total-d.done}</td>
          <td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="progress-bar" style={{width:100}}><div className="progress-fill" style={{width:`${d.total?Math.round((d.done/d.total)*100):0}%`,background:'var(--blue)'}}/></div><span>{d.total?Math.round((d.done/d.total)*100):0}%</span></div></td>
        </tr>)}</tbody>
      </table></div>
    </div>}
    {rtype==='fy'&&<div className="card">
      <div className="card-header"><div className="card-title">Financial Year Report — FY 2024-25</div></div>
      <div className="grid-4" style={{marginBottom:20}}>
        {[['Total',tasks.length,'var(--blue)'],['Completed',tasks.filter(t=>t.status==='Completed').length,'var(--green)'],['Overdue',tasks.filter(t=>t.status==='Overdue').length,'var(--red)'],['Pending',tasks.filter(t=>t.status==='Pending').length,'var(--amber)']].map(([l,v,c])=><div key={l} style={{background:'var(--bg3)',borderRadius:'var(--radius)',padding:16,textAlign:'center'}}>
          <div style={{fontSize:28,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:12,color:'var(--text3)',marginTop:4}}>{l}</div>
        </div>)}
      </div>
      <BarChart data={employees.map(e=>({label:e.name.split(' ')[0],val:tasks.filter(t=>t.assignedTo.includes(e.id)&&t.status==='Completed').length,color:e.color}))}/>
    </div>}
  </div>
}

function AnnouncementsPage({announcements,setAnnouncements,currentUser,users}){
  const canPost=currentUser.role==='admin'||currentUser.role==='manager';
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({title:'',body:'',priority:'Medium'});
  function create(){
    if(!form.title||!form.body)return;
    setAnnouncements(p=>[{id:'a'+Date.now(),date:new Date().toISOString().slice(0,10),by:currentUser.id,...form},...p]);
    setForm({title:'',body:'',priority:'Medium'});setShow(false);
  }
  return <div>
    {canPost&&<button className="btn btn-primary" style={{marginBottom:16}} onClick={()=>setShow(true)}>+ New Announcement</button>}
    {announcements.map(a=>{const poster=users.find(u=>u.id===a.by);return <div key={a.id} className="card" style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
        <div style={{fontSize:16,fontWeight:700}}>{a.title}</div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span className={`badge badge-${a.priority==='High'?'overdue':a.priority==='Medium'?'pending':'done'}`}>{a.priority}</span>
          <span style={{fontSize:11,color:'var(--text3)'}}>{fmtDate(a.date)}</span>
        </div>
      </div>
      <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>{a.body}</p>
      {poster&&<div style={{marginTop:8,display:'flex',alignItems:'center',gap:6}}>
        <div style={{width:20,height:20,borderRadius:'50%',background:poster.color+'22',color:poster.color,fontSize:8,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{poster.avatar}</div>
        <span style={{fontSize:11,color:'var(--text3)'}}>Posted by {poster.name}</span>
      </div>}
    </div>})}
    {show&&<Modal open title="New Announcement" onClose={()=>setShow(false)}>
      <div className="form-group"><label className="form-label">Title</label><input className="input" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/></div>
      <div className="form-group"><label className="form-label">Message</label><textarea className="input" rows={4} value={form.body} onChange={e=>setForm(p=>({...p,body:e.target.value}))} style={{resize:'vertical'}}/></div>
      <div className="form-group"><label className="form-label">Priority</label><select className="select input" value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))}>{['High','Medium','Low'].map(p=><option key={p}>{p}</option>)}</select></div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button className="btn btn-secondary" onClick={()=>setShow(false)}>Cancel</button>
        <button className="btn btn-primary" onClick={create}>Post</button>
      </div>
    </Modal>}
  </div>
}

function ActivityLogPage({logs,users}){
  return <div className="card" style={{padding:0}}>
    <div className="table-wrap"><table>
      <thead><tr><th>Time</th><th>User</th><th>Action</th><th>Type</th></tr></thead>
      <tbody>{logs.map((l,i)=>{const u=users.find(x=>x.id===l.user);return <tr key={i}>
        <td style={{fontSize:12,color:'var(--text3)',whiteSpace:'nowrap'}}>{l.time}</td>
        <td><div style={{display:'flex',alignItems:'center',gap:8}}>{u&&<div style={{width:24,height:24,borderRadius:'50%',background:u.color+'22',color:u.color,fontSize:9,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{u.avatar}</div>}<span style={{fontSize:13}}>{u?.name||l.user}</span></div></td>
        <td style={{fontSize:13}}>{l.action}</td>
        <td><span className={`badge badge-${l.type==='task'?'done':l.type==='assign'?'progress':l.type==='delete'?'overdue':l.type==='admin'?'approval':l.type==='profile'?'pending':'cancelled'}`}>{l.type}</span></td>
      </tr>})}
      </tbody>
    </table></div>
  </div>
}

// ─── MAIN APP ─────────────────────────────────────────────────
function App(){
  const [users,setUsers]=useState(INIT_USERS);
  const [currentUser,setCurrentUser]=useState(null);
  const [tasks,setTasks]=useState(INIT_TASKS);
  const [logs,setLogs]=useState(INIT_LOGS);
  const [announcements,setAnnouncements]=useState(INIT_ANNOUNCEMENTS);
  const [page,setPage]=useState('dashboard');
  const [notifOpen,setNotifOpen]=useState(false);
  const [collapsed,setCollapsed]=useState(false);

  if(!currentUser)return <LoginScreen onLogin={u=>{setCurrentUser(u);setPage('dashboard')}} users={users}/>;

  const isAdmin=currentUser.role==='admin';
  const isManager=currentUser.role==='manager';
  const isEmployee=currentUser.role==='employee';
  const myTasks=isEmployee?tasks.filter(t=>t.assignedTo.includes(currentUser.id)):tasks;
  const overdueCount=myTasks.filter(t=>t.status==='Overdue').length;
  const pendingApproval=tasks.filter(t=>t.status==='Waiting for Approval').length;
  const notifCount=overdueCount+((isAdmin||isManager)?pendingApproval:0);

  const navItems=[
    ...(isAdmin?[{id:'dashboard',label:'Admin Dashboard',icon:'👑'}]:[]),
    ...(!isAdmin?[{id:'dashboard',label:'Dashboard',icon:'📊'}]:[]),
    {id:'tasks',label:isEmployee?'My Tasks':'All Tasks',icon:'📋',badge:isEmployee?overdueCount||(null):(isAdmin||isManager)?pendingApproval||null:null},
    ...(isAdmin?[{id:'users',label:'User Management',icon:'👥',badge:null}]:[]),
    ...(!isEmployee&&!isAdmin?[{id:'employees',label:'Employees',icon:'👥'}]:[]),
    ...(!isEmployee?[{id:'reports',label:'Reports',icon:'📈'}]:[]),
    {id:'announcements',label:'Announcements',icon:'📢'},
    ...(!isEmployee?[{id:'logs',label:'Activity Log',icon:'🗓'}]:[]),
    {id:'profile',label:'My Profile',icon:'⚙️'},
  ];

  const notifs=[
    ...tasks.filter(t=>t.status==='Overdue').map(t=>({id:t.id,text:`Overdue: ${t.title}`,type:'overdue',unread:true})),
    ...((isAdmin||isManager)?tasks.filter(t=>t.status==='Waiting for Approval').map(t=>({id:t.id+'a',text:`Awaiting approval: ${t.title}`,type:'approval',unread:true})):[]),
  ];

  const roleBg={admin:'rgba(255,107,53,0.15)',manager:'rgba(79,142,247,0.15)',employee:'rgba(62,207,106,0.15)'};
  const roleColor={admin:'#ff6b35',manager:'var(--blue)',employee:'var(--green)'};

  return <div id="app">
    <div className={`sidebar${collapsed?' collapsed':''}`}>
      <div className="sidebar-brand">
        <div className="brand-icon">📊</div>
        {!collapsed&&<div className="brand-text">SmartWork<div className="brand-sub">v3.0 · FY 2024-25</div></div>}
      </div>
      <div className="sidebar-nav">
        {navItems.map(item=><div key={item.id} className={`nav-item${page===item.id?' active':''}`} onClick={()=>setPage(item.id)}>
          <span className="nav-icon">{item.icon}</span>
          {!collapsed&&<><span>{item.label}</span>{item.badge?<span className="nav-badge">{item.badge}</span>:null}</>}
        </div>)}
      </div>
      <div className="sidebar-user">
        <div className="user-card" onClick={()=>setPage('profile')}>
          <div className="user-avatar" style={{background:currentUser.color+'22',color:currentUser.color}}>{currentUser.avatar}</div>
          {!collapsed&&<div style={{overflow:'hidden',flex:1}}>
            <div className="user-name">{currentUser.name}</div>
            <div className="user-role" style={{display:'flex',alignItems:'center',gap:4}}>
              <span style={{fontSize:10,background:roleBg[currentUser.role],color:roleColor[currentUser.role],padding:'1px 6px',borderRadius:8,fontWeight:600}}>{currentUser.role.toUpperCase()}</span>
            </div>
          </div>}
        </div>
        {!collapsed&&<button className="btn btn-secondary" style={{width:'100%',marginTop:6,fontSize:12,padding:'7px'}} onClick={()=>setCurrentUser(null)}>🚪 Logout</button>}
      </div>
    </div>

    <div className="main">
      <div className="topbar">
        <button className="btn-icon" onClick={()=>setCollapsed(p=>!p)} style={{fontSize:18}}>{collapsed?'→':'☰'}</button>
        <div className="page-title">{navItems.find(n=>n.id===page)?.label||page}</div>
        <div className="topbar-actions">
          <span style={{fontSize:12,color:'var(--text3)',display:'none'}}>{new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>
          <div style={{background:roleBg[currentUser.role],color:roleColor[currentUser.role],padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:700}}>{currentUser.role.toUpperCase()}</div>
          <div style={{position:'relative'}}>
            <button className="btn-icon" onClick={()=>setNotifOpen(p=>!p)}>🔔</button>
            {notifCount>0&&<div className="notification-dot"/>}
          </div>
        </div>
      </div>

      <div className="content">
        {page==='dashboard'&&(isAdmin?<ManagerDashboard tasks={tasks} logs={logs} users={users}/>:isManager?<ManagerDashboard tasks={tasks} logs={logs} users={users}/>:<EmployeeDashboard emp={currentUser} tasks={tasks}/>)}
        {page==='tasks'&&<TaskList tasks={tasks} setTasks={setTasks} currentUser={currentUser} users={users} setLogs={setLogs}/>}
        {page==='users'&&isAdmin&&<AdminUsersPage users={users} setUsers={setUsers} setLogs={setLogs}/>}
        {page==='employees'&&!isEmployee&&!isAdmin&&<div className="grid-2">
          {users.filter(u=>u.role==='employee').map(e=><div key={e.id} className="card" style={{padding:'14px 16px'}}>
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <div style={{width:44,height:44,borderRadius:'50%',background:e.color+'22',color:e.color,fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{e.avatar}</div>
              <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{e.name}</div><div style={{fontSize:12,color:'var(--text3)'}}>{e.designation}</div></div>
              <span className={`badge ${e.status==='Active'?'badge-done':'badge-cancelled'}`}>{e.status}</span>
            </div>
            <div className="grid-2" style={{gap:8,marginTop:12}}>
              {[['Dept',e.dept],['Mobile',e.mobile],['Email',e.email],['Joined',fmtDate(e.joining)]].map(([k,v])=><div key={k}><div style={{fontSize:10,color:'var(--text3)'}}>{k}</div><div style={{fontSize:12,fontWeight:500,marginTop:1}}>{v}</div></div>)}
            </div>
          </div>)}
        </div>}
        {page==='reports'&&!isEmployee&&<ReportsPage tasks={tasks} users={users}/>}
        {page==='announcements'&&<AnnouncementsPage announcements={announcements} setAnnouncements={setAnnouncements} currentUser={currentUser} users={users}/>}
        {page==='logs'&&!isEmployee&&<ActivityLogPage logs={logs} users={users}/>}
        {page==='profile'&&<ProfilePage currentUser={currentUser} users={users} setUsers={setUsers} setLogs={setLogs} onUserUpdate={u=>setCurrentUser(u)}/>}
      </div>
    </div>

    <div className={`notif-panel${notifOpen?' open':''}`}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:700}}>Notifications {notifCount>0&&<span style={{background:'var(--red)',color:'white',fontSize:11,padding:'2px 7px',borderRadius:10,marginLeft:6}}>{notifCount}</span>}</div>
        <button className="btn-icon" onClick={()=>setNotifOpen(false)} style={{width:28,height:28,fontSize:14}}>✕</button>
      </div>
      {notifs.length?notifs.map(n=><div key={n.id} className={`notif-item${n.unread?' unread':''}`}>
        <div style={{fontSize:13,fontWeight:500}}>{n.type==='overdue'?'🚨':n.type==='approval'?'✅':'ℹ️'} {n.text}</div>
        <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>{n.type==='overdue'?'Task is overdue':n.type==='approval'?'Pending your approval':''}</div>
      </div>):<div style={{fontSize:13,color:'var(--text3)',textAlign:'center',padding:20}}>No new notifications</div>}
    </div>
    {notifOpen&&<div style={{position:'fixed',inset:0,zIndex:499}} onClick={()=>setNotifOpen(false)}/>}
  </div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
